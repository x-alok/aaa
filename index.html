<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alok Bot - AI Assistant</title>
    <script>
      // Apply theme from localStorage immediately to prevent FOUC (Flash of incorrect theme)
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // This configures Tailwind CSS to use the 'class' strategy for dark mode.
      // This script must come AFTER the main Tailwind library script.
      tailwind.config = {
        darkMode: 'class'
      }
    </script>
    <style>
      /* For custom scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #c7c7c7;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8;
      }

      html.dark ::-webkit-scrollbar-track {
        background: #1a1a2e;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #4a4a6a;
      }
      html.dark ::-webkit-scrollbar-thumb:hover {
        background: #6a6a8a;
      }
    </style>
  <script type="importmap">

    "react": "https://aistudiocdn.com/react@^19.1.1",

    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.21.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</html>
